* { box-sizing: border-box; }

.bmd-account img { width: 20px; height: 20px; border-radius: 50%; border: 1px solid var(--ink); }
.bmd-account button { background: none; border: none; color: var(--red); text-decoration: underline; cursor: pointer; font-size: 12px; font-family: 'Spectral', serif; }

.bmd-signin-card p { color: var(--ink-soft); font-size: 14px; margin-bottom: 22px; }

  background: var(--ink); color: var(--paper); border: none; cursor: pointer;
}
.bmd-google-btn:hover { background: var(--pitch); }
.bmd-google-btn svg { width: 18px; height: 18px; }

.bmd-card { background: var(--paper); border: 1.5px solid var(--ink); box-shadow: 4px 4px 0 var(--line); padding: 20px; margin-bottom: 22px; }

.bmd-slot { position: relative; }

function slugify(title){
  return title.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
}

function defaultRating(song){
  return { title: song.title, album: song.album, elo: START_ELO, played: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0 };
}
function getRating(song){
  return ratingsMap[slugify(song.title)] || defaultRating(song);
}
function marginMultiplier(gd){
  if (gd === 0) return 1;
  return Math.min(1 + Math.log(gd) * 0.7, 3);
}

function attachListeners(uid){
  const ratingsCol = collection(db, "users", uid, "ratings");
  const matchesCol = collection(db, "users", uid, "matches");

  unsubRatings = onSnapshot(ratingsCol, snap => {
    const next = {};
    snap.forEach(d => next[d.id] = d.data());
    ratingsMap = next;
    if (!listenersAttached) { listenersAttached = true; boot(); }
    else { renderTableOnly(); refreshPickedPanels(); renderFooterCount(); }
  }, err => console.error("Ratings sync error", err));

  unsubMatches = onSnapshot(query(matchesCol, orderBy("ts", "desc"), limit(30)), snap => {
    matches = snap.docs.map(d => d.data());
    if (listenersAttached) renderLogOnly();
  }, err => console.error("Matches sync error", err));
}

function boot(){

async function recordMatch(songA, songB, scoreA, scoreB){
  const uid = currentUser.uid;
  const slugA = slugify(songA.title), slugB = slugify(songB.title);
  await runTransaction(db, async (tx) => {
    const refA = doc(db, "users", uid, "ratings", slugA);
    const refB = doc(db, "users", uid, "ratings", slugB);
    const [snapA, snapB] = await Promise.all([tx.get(refA), tx.get(refB)]);
    const ra = snapA.exists() ? snapA.data() : defaultRating(songA);
    const rb = snapB.exists() ? snapB.data() : defaultRating(songB);

    const gd = Math.abs(scoreA - scoreB);
    const mult = marginMultiplier(gd);
    const expA = 1 / (1 + Math.pow(10, (rb.elo - ra.elo) / 400));
    const expB = 1 - expA;
    let resA, resB;
    if (scoreA > scoreB) { resA = 1; resB = 0; }
    else if (scoreA < scoreB) { resA = 0; resB = 1; }
    else { resA = 0.5; resB = 0.5; }
    const newEloA = ra.elo + K * mult * (resA - expA);
    const newEloB = rb.elo + K * mult * (resB - expB);

    const upd = (r, song, myScore, oppScore, res, newElo) => ({
      title: song.title, album: song.album, elo: newElo,
      played: (r.played || 0) + 1,
      w: (r.w || 0) + (res === 1 ? 1 : 0),
      d: (r.d || 0) + (res === 0.5 ? 1 : 0),
      l: (r.l || 0) + (res === 0 ? 1 : 0),
      gf: (r.gf || 0) + myScore,
      ga: (r.ga || 0) + oppScore
    });

    tx.set(refA, upd(ra, songA, scoreA, scoreB, resA, newEloA));
    tx.set(refB, upd(rb, songB, scoreB, scoreA, resB, newEloB));

    const matchRef = doc(collection(db, "users", uid, "matches"));
    tx.set(matchRef, {
      a: songA.title, b: songB.title, sa: scoreA, sb: scoreB,
      da: newEloA - ra.elo, db: newEloB - rb.elo, ts: Date.now()
    });
  });
}

async function clearAllData(){
  const uid = currentUser.uid;
  const ratingsSnap = await getDocs(collection(db, "users", uid, "ratings"));
  const matchesSnap = await getDocs(collection(db, "users", uid, "matches"));
  const allDocs = [...ratingsSnap.docs, ...matchesSnap.docs];
  for (let i = 0; i < allDocs.length; i += 400) {
    const batch = writeBatch(db);
    allDocs.slice(i, i + 400).forEach(d => batch.delete(d.ref));
    await batch.commit();
  }
}

function searchSongs(q){
  if (!q) return [];
  const lower = q.toLowerCase();
  return SONGS.filter(s => s.title.toLowerCase().includes(lower)).slice(0, 8);
}
function fmtElo(n){ return Math.round(n); }
function fmtDelta(n){ const r = Math.round(n); return (r >= 0 ? "+" : "") + r; }
function totalMatchesCount(){
  let sum = 0;
  Object.values(ratingsMap).forEach(r => sum += (r.played || 0));
  return Math.round(sum / 2);
}

function render(){
  const app_ = document.getElementById("bmdApp");
  const canSubmit = picked.A && picked.B && picked.A.title !== picked.B.title;

  app_.innerHTML =
    '<div class="bmd-card">' +
      '<div class="bmd-card-title">Kickoff &mdash; Search Two Songs</div>' +
      '<div class="bmd-fixture">' +
        '<div class="bmd-slot"><span class="bmd-slot-label">Home</span>' +
          '<input class="bmd-search" id="searchA" placeholder="Search a song&hellip;" value="' + searchState.A + '" autocomplete="off">' +
          '<div id="dropdownA"></div></div>' +
        '<div class="bmd-vs">VS</div>' +
        '<div class="bmd-slot"><span class="bmd-slot-label">Away</span>' +
          '<input class="bmd-search" id="searchB" placeholder="Search a song&hellip;" value="' + searchState.B + '" autocomplete="off">' +
          '<div id="dropdownB"></div></div>' +
      '</div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;">' +
        '<div class="bmd-picked" id="pickedA">' + renderPicked(picked.A) + '</div>' +
        '<div class="bmd-picked" id="pickedB">' + renderPicked(picked.B) + '</div>' +
      '</div>' +
      '<div class="bmd-score-row">' +
        '<input type="number" min="0" max="99" class="bmd-score-input" id="scoreA" value="0">' +
        '<div class="bmd-dash">&ndash;</div>' +
        '<input type="number" min="0" max="99" class="bmd-score-input" id="scoreB" value="0">' +
      '</div>' +
      '<button class="bmd-btn" id="submitBtn" ' + (canSubmit ? "" : "disabled") + '>Full Time &mdash; Record Result</button>' +
      '<div class="bmd-flash" id="flash"></div>' +
    '</div>' +

    '<div class="bmd-card">' +
      '<div class="bmd-card-title">League Table</div>' +
      '<div class="bmd-toolbar">' +
        '<input id="tableFilter" placeholder="Filter table by song or album&hellip;" value="' + tableFilter + '">' +
        '<label><input type="checkbox" id="onlyPlayed" ' + (onlyPlayed ? "checked" : "") + '> Played only</label>' +
      '</div>' +
      '<div id="tableWrap" style="overflow-x:auto;">' + renderTable() + '</div>' +
    '</div>' +

    '<div class="bmd-card">' +
      '<div class="bmd-card-title">Recent Results</div>' +
      '<div class="bmd-log" id="logWrap">' + renderLog() + '</div>' +
    '</div>' +

    '<div class="bmd-footer">' +
      '<span id="footerCount">' + SONGS.length + ' songs &middot; ' + totalMatchesCount() + ' matches logged</span>' +
      '<button id="resetBtn">Clear my data</button>' +
    '</div>';

  document.getElementById("searchA").addEventListener("input", e => onSearchInput("A", e.target.value));
  document.getElementById("searchB").addEventListener("input", e => onSearchInput("B", e.target.value));
  document.getElementById("submitBtn").addEventListener("click", onSubmit);
  document.getElementById("resetBtn").addEventListener("click", onReset);
  document.getElementById("tableFilter").addEventListener("input", e => { tableFilter = e.target.value; renderTableOnly(); });
  document.getElementById("onlyPlayed").addEventListener("change", e => { onlyPlayed = e.target.checked; renderTableOnly(); });
  attachSortHandlers();
  renderDropdown("A");
  renderDropdown("B");
}

function attachSortHandlers(){
  document.querySelectorAll("[data-sort]").forEach(th => {
    th.addEventListener("click", () => {
      const col = th.getAttribute("data-sort");
      if (sortCol === col) sortDir = sortDir === "desc" ? "asc" : "desc";
      else { sortCol = col; sortDir = "desc"; }
      renderTableOnly();
    });
  });
}

function renderPicked(song){
  if (!song) return '<div class="bmd-empty">No song selected yet</div>';
  const r = getRating(song);
  return '<div class="name">' + song.title + '</div><div class="meta">' + song.album +
    '</div><div class="rating">Elo ' + fmtElo(r.elo) + ' &middot; ' + r.played + ' played</div>';
}
function refreshPickedPanels(){
  const a = document.getElementById("pickedA"), b = document.getElementById("pickedB");
  if (a) a.innerHTML = renderPicked(picked.A);
  if (b) b.innerHTML = renderPicked(picked.B);
}
function renderFooterCount(){
  const el = document.getElementById("footerCount");
  if (el) el.textContent = SONGS.length + " songs \u00b7 " + totalMatchesCount() + " matches logged";
}

function renderTableOnly(){
  const wrap = document.getElementById("tableWrap");
  if (!wrap) return;
  wrap.innerHTML = renderTable();
  attachSortHandlers();
}
function renderLogOnly(){
  const wrap = document.getElementById("logWrap");
  if (!wrap) return;
  wrap.innerHTML = renderLog();
}

function renderTable(){
  let rows = SONGS.map(s => ({ song: s, r: getRating(s) }));
  if (onlyPlayed) rows = rows.filter(x => x.r.played > 0);
  if (tableFilter) {
    const lower = tableFilter.toLowerCase();
    rows = rows.filter(x => x.song.title.toLowerCase().includes(lower) || x.song.album.toLowerCase().includes(lower));
  }
  rows.forEach(x => x.gd = x.r.gf - x.r.ga);
  rows.sort((a, b) => {
    let av, bv;
    switch(sortCol){
      case "song": av = a.song.title; bv = b.song.title; break;
      case "played": av = a.r.played; bv = b.r.played; break;
      case "gd": av = a.gd; bv = b.gd; break;
      default: av = a.r.elo; bv = b.r.elo;
    }
    if (typeof av === "string") return sortDir === "desc" ? bv.localeCompare(av) : av.localeCompare(bv);
    return sortDir === "desc" ? bv - av : av - bv;
  });
  if (rows.length === 0){
    return '<div class="bmd-empty" style="padding:10px 0;">No matches yet ' + (onlyPlayed ? "&mdash; play a fixture above" : "matching that filter") + '.</div>';
  }
  const bodyRows = rows.map((x, i) =>
    '<tr><td class="rank">' + (i+1) + '</td>' +
    '<td>' + x.song.title + '<div class="song-album">' + x.song.album + '</div></td>' +
    '<td class="num">' + fmtElo(x.r.elo) + '</td>' +
    '<td class="num">' + x.r.played + '</td>' +
    '<td class="num">' + x.r.w + '-' + x.r.d + '-' + x.r.l + '</td>' +
    '<td class="num ' + (x.gd > 0 ? 'gd-pos' : x.gd < 0 ? 'gd-neg' : '') + '">' + (x.gd > 0 ? '+' : '') + x.gd + '</td></tr>'
  ).join("");
  return '<table class="bmd-table"><thead><tr>' +
      '<th></th><th data-sort="song">Song</th><th class="num" data-sort="elo">Elo</th>' +
      '<th class="num" data-sort="played">P</th><th class="num">W-D-L</th><th class="num" data-sort="gd">GD</th>' +
    '</tr></thead><tbody>' + bodyRows + '</tbody></table>';
}

function renderLog(){
  if (!matches.length) return '<div class="bmd-log-empty">No matches logged yet.</div>';
  return matches.map(m =>
    '<div class="bmd-log-row"><span>' + m.a + ' <span class="lscore">' + m.sa + '&ndash;' + m.sb + '</span> ' + m.b + '</span>' +
    '<span style="color:' + (m.da >= 0 ? '#1f5c3f' : '#a83232') + ';white-space:nowrap;">' + fmtDelta(m.da) + ' / ' + fmtDelta(m.db) + '</span></div>'
  ).join("");
}

function onSearchInput(slot, value){ searchState[slot] = value; renderDropdown(slot); }

function renderDropdown(slot){
  const el = document.getElementById("dropdown" + slot);
  if (!el) return;
  const q = searchState[slot];
  const results = searchSongs(q);
  if (!q || results.length === 0){ el.innerHTML = ""; el.className = ""; return; }
  el.className = "bmd-dropdown";
  el.innerHTML = results.map(s =>
    '<div class="bmd-opt" data-title="' + s.title.replace(/"/g,'&quot;') + '">' + s.title +
    '<small>' + s.album + ' &middot; Elo ' + fmtElo(getRating(s).elo) + '</small></div>'
  ).join("");
  el.querySelectorAll(".bmd-opt").forEach(opt => {
    opt.addEventListener("click", () => {
      const title = opt.getAttribute("data-title");
      const song = SONGS.find(s => s.title === title);
      picked[slot] = song;
      searchState[slot] = song.title;
      render();
    });
  });
}

async function onSubmit(){
  const btn = document.getElementById("submitBtn");
  const scoreA = parseInt(document.getElementById("scoreA").value, 10) || 0;
  const scoreB = parseInt(document.getElementById("scoreB").value, 10) || 0;
  if (!picked.A || !picked.B || picked.A.title === picked.B.title) return;
  btn.disabled = true;
  btn.textContent = "Recording…";
  try {
    await recordMatch(picked.A, picked.B, scoreA, scoreB);
    picked = { A: null, B: null };
    searchState = { A: "", B: "" };
    render();
    document.getElementById("flash").textContent = "Recorded: " + scoreA + "\u2013" + scoreB + ". Ready for the next matchup.";
  } catch(e){
    console.error(e);
    document.getElementById("flash").textContent = "Couldn't save — check your connection and try again.";
    btn.disabled = false;
    btn.textContent = "Full Time — Record Result";
  }
}

async function onReset(){
  if (!confirm("Clear all of your matchup data? This can't be undone.")) return;
  await clearAllData();
}
</script>

</html>
